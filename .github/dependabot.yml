version: 2
updates:
  # Frontend (Bun reads package.json via the npm ecosystem)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      frontend-dev:
        dependency-type: development
      frontend-prod:
        dependency-type: production

  # Rust backend
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 10

  # GitHub Actions (keeps workflow action versions current)
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
