# cargo-deny configuration — supply-chain policy for the Rust backend.
# Run: cargo deny --manifest-path src-tauri/Cargo.toml check

[graph]
# Check the targets CREBAIN actually ships on, so we don't fail on advisories in
# dependency trees for platforms we never build (e.g. unrelated *-windows crates).
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-apple-darwin",
    "x86_64-apple-darwin",
]
all-features = true

[advisories]
version = 2
# Yanked crates warn rather than fail: the only yanked entries are transitive
# (core2, stabby — pulled in by the Zenoh stack) with no newer published
# versions, so failing here would block on something we cannot fix. The audit
# workflow (cargo audit) keeps them visible and Dependabot tracks upstream fixes.
yanked = "warn"
# Only fail on *unmaintained* advisories for crates we depend on directly; the
# deep transitive GUI stack pulled in by Tauri on Linux (gtk-rs, etc.) is not
# something this project can fix and is tracked upstream.
unmaintained = "workspace"
# Transitive advisories with no actionable fix for this project. Each is
# assessed as low-risk for a local desktop research prototype and tracked for
# upstream resolution; cargo audit still reports them.
ignore = [
    # rsa timing side-channel (Marvin). No fixed release upstream; reaches us
    # only transitively and the app performs no remote RSA timing-sensitive ops.
    "RUSTSEC-2023-0071",
    # rand unsoundness only under a specific custom-global-logger interaction;
    # not triggered by CREBAIN's usage. Remove once a patched rand is published.
    "RUSTSEC-2026-0097",
]

[licenses]
version = 2
# Permissive / OSI-approved licenses present in the dependency tree.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Unlicense",
    "OpenSSL",
    "BSL-1.0",
    # Permissive data license (transitive, e.g. webpki-roots certificate data).
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
# Surface accidental duplicate versions without failing the build.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
